     generated loader at {{{ SCRIPT }}}. The asset-picker pre-js (YODA_WASM_PRELOAD=OFF
     builds) overlays its own folder prompt on top of this page. -->

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64,AAABAAEAICAQAAEABADoAgAAFgAAACgAAAAgAAAAQAAAAAEABAAAAAAAAAIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAACAAAAAgIAAgAAAAIAAgACAgAAAwMDAAICAgAAAAP8AAP8AAAD//wD/AAAA/wD/AP//AAD///8AAAAAAAAAcQAAAAAAAAAAAAAAAAAAAHMAAAAAAAAAAAAAAAAAAAA7EAABAQEAAAAAAAAAAAAACzAAABMQEAAAAAAAAAAAAAgxAAEBMQEAAAAAAAAAAAAAMQAAEBMQAAAAAAAAAAAAAAAAABEBMQAAAAAAAAAQAzBzMwATEBAAAAAAAAABMDsAOzcwMTEBAAAAAAAAAxAzsxOzsDMzEAAAAAAAADE7GxM7vzAbOzEAAAAAAAMTswEAE7MAAbOzAAAAAAABOzAAAAAAAAE7OzAAAAAAAbsxAAAAAAAAE7MwAAAAAAOzEBAAAAAAABO7MAAAAAABMTEAABEQEAABswAAAAAAABMQAQExMQEAADMAAAAAAAAAABATExMREAMwAAAAAAAAABARMQAzMzEAAAAAAAAAAAEBMzN7szMzEAAAAAAAAAAAEzMwATM7szEwAAAAAAABATExM7szM7szMwAAAAAAEBMTABNzMAM7MRMwAAAAAQMzATEBMxMTu7ARMwAAABO7szAAMzMxMzszARMwAAN7MAEzMzM7Ozu/u7sxMwALAAAAEzOzs7O7+/ADuzswAAAAAAMzs7v7/7sAAAAAAAAAAAAAOzu/v/uwAAAAAAAAAAAAAAO7u/u7AAAAAAAAAAAAAAAAA7u7AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/4f///4AB//4AAH/8AAA/+AAAP/gAAB/wAAAf8AAAH/AAAB/wAAAf4AAAH+AAAB/gAAAP4AAAD+AAAA/gAAAf8AAAH/gAAD/4AAA//AAAf/AAAD/gAAAfwAAAD4AAAAeAAAADAAAAAQYAAAA/AAGA/4AD///AB///4A////g//w==">
  <!-- ^ the real YodaDemo.exe app icon (GROUP_ICON id 2 / IDR_MAINFRAME, 32x32 16-color),
       assembled into an .ico + inlined so the page stays self-contained -->
  <title>Desktop Adventures</title>
  <style>
    /* Win95 default wallpaper color */
    html, body { margin: 0; padding: 0; height: 100%; background: #008080; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    canvas.emscripten {
      border: 0; outline: none; display: block;
      image-rendering: pixelated; image-rendering: crisp-edges;
      max-width: 100vw; max-height: 100vh;
    }
    #status {
      color: #404040; font: 14px system-ui, sans-serif; padding: 8px;
      position: fixed; bottom: 6px; left: 0; right: 0; text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <div id="status"></div>
  <script>
    var statusElement = document.getElementById('status');
    var Module = {
      canvas: (function () {
        var canvas = document.getElementById('canvas');
        // wasm context loss: a reload is the honest recovery
        canvas.addEventListener('webglcontextlost', function (e) {
          e.preventDefault();
          statusElement.textContent = 'Graphics context lost — reload the page.';
        }, false);
        return canvas;
      })(),
      print: function () { console.log.apply(console, arguments); },
      printErr: function () { console.warn.apply(console, arguments); },
      setStatus: function (text) {
        // emscripten load progress ("Downloading data... (x/y)"); blank once running
        statusElement.textContent = text || '';
      },
      monitorRunDependencies: function (left) {
        if (left === 0) statusElement.textContent = '';
      },
    };
    window.onerror = function (msg) {
      statusElement.textContent = 'Error — see the browser console.';
      console.error(msg);
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
